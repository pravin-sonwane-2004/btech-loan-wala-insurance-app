spring.application.name=sawai-insurance-management
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sawai_insurance?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

app.auth.admin-token=${ADMIN_AUTH_TOKEN:SAWAI_ADMIN_TOKEN_2026}
app.auth.agent-token=${AGENT_AUTH_TOKEN:SAWAI_AGENT_TOKEN_2026}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
